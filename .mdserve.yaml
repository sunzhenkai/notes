# mdserve 配置文件
# 更多信息请参考: https://github.com/wii/mdserve

# 网站配置
site:
  # 网站名称，显示在导航栏
  name: "Wii's Blogs"
  # 默认展示的文档，不配置则默认展示 README.md（忽略大小写）
  default_doc: "README.md"

# 服务配置
server:
  # 监听地址，如需局域网访问请设置为 "0.0.0.0"
  host: "0.0.0.0"
  # 监听端口
  port: 8232

# 文档路径配置（可选，命令行参数优先）
docs:
  # 文档根目录
  path: "."

# Git 自动拉取配置（可选）
git:
  # 是否启用自动拉取
  enabled: false
  # 拉取间隔，支持格式：30s, 5m, 1h 等
  interval: "5m"
  # 分支名称
  branch: "main"

# 菜单配置（可选）
# 支持两级菜单结构
# 叶子节点类型:
#   - doc: 具体文档，需要指定 path
#   - category: 分类（目录），需要指定 path
#   - tag: 标签，需要指定 tag 名称
menu:
  - title: "入门指南"
    children:
      - title: "快速开始"
        type: doc
        path: "guide/getting-started.md"
      - title: "配置说明"
        type: doc
        path: "guide/configuration.md"

  - title: "API 文档"
    children:
      - title: "接口列表"
        type: category
        path: "api"
      - title: "示例代码"
        type: doc
        path: "api/examples.md"

  - title: "按标签"
    children:
      - title: "核心概念"
        type: tag
        tag: "core"
      - title: "进阶用法"
        type: tag
        tag: "advanced"
